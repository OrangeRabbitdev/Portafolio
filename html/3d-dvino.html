		<script type="module">

			import * as THREE from 'three';

			import { MTLLoader } from 'https://biznagamedia.com/code/interactivo3d/jsm/loaders/MTLLoader.js';
			import { OBJLoader } from 'https://biznagamedia.com/code/interactivo3d/jsm/loaders/OBJLoader.js';
			import { GLTFLoader } from 'https://biznagamedia.com/code/interactivo3d/jsm/loaders/GLTFLoader.js';
			import { OrbitControls } from 'https://biznagamedia.com/code/interactivo3d/jsm/controls/OrbitControls.js';
			import {RGBELoader} from "https://biznagamedia.com/code/interactivo3d/jsm/loaders/RGBELoader.js";

			let camera, scene, renderer;

			let mouseX = 0, mouseY = 0;


			
			let canvasWidth = 320;
			let canvasHeight = 480;
			let controls;
			let indexLoad = 0;
			let GLBModels = ['Lata_azul', 'Lata_morada', 'Lata_rosa'];


			init();
			animate();

			function loadGLB(){
					new GLTFLoader().setPath('https://biznagamedia.com/code/interactivo3d/models/glb/')
					.load(GLBModels[indexLoad]+'.glb', function(glb){

						glb.scene.scale.set(120,120,120);
						glb.scene.position.set(0,45,0);
						scene.add(glb.scene);

				});
				}

			function init() {


				const container = document.createElement( 'div' );
				document.body.appendChild( container );

				camera = new THREE.PerspectiveCamera( 80, canvasWidth / canvasHeight, 20, 5000 );
				//camera.position.z = 650;
				//camera.position.y = 750;
				camera.position.set(100,50,200); // Set position like this
				//camera.fov = 20;
				

				// scene

				scene = new THREE.Scene();

				//const geometry = new THREE.BoxGeometry( 5, 5, 5 );
//const material = new THREE.MeshNormalMaterial();

				const ambientLight = new THREE.AmbientLight( 0xffdb95, 0 );
				scene.add( ambientLight );

				const directionalLight = new THREE.DirectionalLight( 0xffffff, 2 );
				scene.add( directionalLight );

				const pointLight = new THREE.PointLight( 0xffffff, 1 );
				camera.add( pointLight );
				scene.add( camera );


				// model

				const onProgress = function ( xhr ) {

					if ( xhr.lengthComputable ) {

						const percentComplete = xhr.loaded / xhr.total * 100;
						//console.log( Math.round( percentComplete, 2 ) + '% downloaded' );

					}

				};



				loadGLB();





				//
				//BACKGROUND JPG
				let backLoader = new THREE.TextureLoader();
				backLoader.load('https://biznagamedia.com/code/interactivo3d/v.mp4', function(texture){
					scene.background = texture;
				});

				//
				//BACKGROUND HDR
				
				new RGBELoader().load("https://biznagamedia.com/code/interactivo3d/es.hdr", function(texture){
					texture.mapping = THREE.EquirectangularReflectionMapping;
					//scene.background = texture;
					scene.environment = texture;
				});




				renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true});

				//HDRI
				renderer.toneMapping = THREE.ACESFilmicToneMapping;
				renderer.toneMappingExposure = 0.6;
				renderer.outputEncoding = THREE.sRGBEnconding;


				renderer.outputEncoding = THREE.sRGBEncoding;
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( canvasWidth, canvasHeight );
				container.appendChild( renderer.domElement );

				
				//CONTROLES
				controls = new OrbitControls(camera, renderer.domElement);
				controls.autoRotate = true;
				controls.autoRotateSpeed = - 1.0;
				controls.enableDamping = true;

				
var contador = 0;
				controls.addEventListener('start', function(){
					contador++;
						if(contador <= 1){
							
							dhtml.sendEvent('1', 'move_3d');
							console.log("move_3d");
						}
					});

				//POR SI SE NECESITA
				//controls.addEventListener('change', ()=> console.log("Change"));
				//controls.addEventListener('end', ()=> console.log("Se detuvo"));



/*
				document.addEventListener( 'mousemove', onDocumentMouseMove );

				//

				window.addEventListener( 'resize', onWindowResize );
				
*/
			}
			$('.LataAzul').click(function(){

				dhtml.sendEvent('2', 'LataAzul', null);
            // Lanzamiento evento Click
            console.log("LataAzul")

				indexLoad = 0;
				loadGLB();
				$('.indicador').fadeOut(300);
				clearInterval(interval);		
			});	
			$('.LataMorada').click(function(){

				dhtml.sendEvent('3', 'LataMorada', null);
            // Lanzamiento evento Click
            console.log("LataMorada")

				indexLoad = 1;
				loadGLB();
				$('.indicador').fadeOut(300);
				clearInterval(interval);		
			});	
			$('.LataRosa').click(function(){
				
				dhtml.sendEvent('4', 'LataRosa', null);
            // Lanzamiento evento Click
            console.log("LataRosa")

				indexLoad = 2;
				loadGLB();
				$('.indicador').fadeOut(300);
				clearInterval(interval);		
			});

			}

			//

			function autoChange(){
					//console.log("cambiando");
					indexLoad++;
					loadGLB();

					if(indexLoad == GLBModels.length){
						indexLoad = -1;
					}
				}	



			var interval = setInterval(autoChange, 1800);



			function animate() {	
				requestAnimationFrame( animate );
				controls.update();
				renderer.render( scene, camera );
				camera.lookAt( scene.position );

			}

			




			
			
		</script>
