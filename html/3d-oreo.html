    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'GLTFLoader';
        import { DRACOLoader } from 'DRACOLoader';
        import { OrbitControls } from 'OrbitControls';
        import { FBXLoader } from 'FBXLoader';
        import { RGBELoader } from 'RGBELoader';
        import TWEEN from 'https://cdn.skypack.dev/@tweenjs/tween.js';

        let urlModels = "https://biznagamedia.com/code/OREO/";
        let urlHDRI = "https://biznagamedia.com/code/OREO/hdr.hdr";
        let Models = ['galleta2.glb'];
        let anchoBanner = 300;
        let altoBanner = 600;

        const animacionInicial = 
            {
                rotacionX: 0,
                rotacionY: 0,
                rotacionZ: 0,
                posicionX: 0,
                posicionY: -10,
                posicionZ: 0,
                escala: 150,
                color1:{r:1, g:1, b:1},
                color2:{r: 2, g:2, b:2},
            };
        

        const FasesAnimaciones = [
            //PRIMERA
            {
                rotacionX: 0,
                rotacionY: 0,
                rotacionZ: 0,
                posicionX: 0,
                posicionY: -10,
                posicionZ: 0,
                escala: 150,
                color1:{r:1, g:1, b:1},
                color2:{r: 2, g:2, b:2},
            },

            // SEGUNDA
            {
                rotacionX: 0,
                rotacionY: 0,
                rotacionZ: 0,
                posicionX: -20,
                posicionY: -15,
                posicionZ: 0,
                escala: 150,
                color1:{r:1, g:1, b:1},
                color2:{r: 2, g:2, b:2},
            },

            //TERCERA
            {
                rotacionX: 0,
                rotacionY: 0,
                rotacionZ: 0,
                posicionX: 0,
                posicionY: -10,
                posicionZ: 0,
                escala: 150,
                color1:{r:12, g:6, b:2},
                color2:{r: 2, g:2, b:2},
            },

            //CUARTA
            {
                rotacionX: 0,
                rotacionY: 0,
                rotacionZ: 0,
                posicionX: 0,
                posicionY: -10,
                posicionZ: 0,
                escala: 150,
                color1:{r:1, g:1, b:1},
                color2:{r: 2, g:2, b:2},
            },

            //QUINTA
            {
                rotacionX: 50,
                rotacionY: 180,
                rotacionZ: 80,
                posicionX: 0,
                posicionY: -15,
                posicionZ: 0,
                escala: 200,
                color1:{r:1, g:1, b:1},
                color2:{r: 2, g:2, b:2},
            }
        ];

        let isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent); // Detecta si el usuario está en un dispositivo móvil, incluyendo iOS
        let pasosAnimacion = isMobile ? 120 : 480; // Reducir pasos para móviles

        let rotacionX = 195;
        let rotacionY = 180;
        let rotacionZ = 85;

        let posicionX = -150;
        let posicionY = 85;
        let posicionZ = 0;

        let escalaInicial = 200;


        let ColorInicial1 = {r: 0.5, g:0.5, b:0.5};
        let ColorInicial2 = {r: 0, g:1, b:0};


        let Material1, Material2;

        let RotacionAutomatica = false;
        let Exposicion = 1.0;


        let camera, scene, renderer, model, mixer, animations;
        let controls;
        let indexLoad = 0;




        let cargaCompleta = false;
        let cargado = false;
           
        init();
        animate();

        function degToRad(degrees) {
            return degrees * (Math.PI / 180);
        }

        function loadModel() {
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://biznagamedia.com/code/interactivo3d/jsm/libs/draco/');

            const gltfLoader = new GLTFLoader();
            gltfLoader.setDRACOLoader(dracoLoader);
            gltfLoader.setPath(urlModels).load(Models[indexLoad], function (gltf) {
                model = gltf.scene;
                model.scale.set(escalaInicial, escalaInicial, escalaInicial);
                model.rotation.set(degToRad(rotacionX), degToRad(rotacionY), degToRad(rotacionZ));
                model.position.set(posicionX, posicionY, posicionZ);
                scene.add(model);
                animations = gltf.animations;

                model.traverse(child => {
                    if (child.isMesh && child.material && child.material.name == 'cookie') {
                        Material1 = child.material;
                        Material1.color.setRGB(ColorInicial1.r, ColorInicial1.g, ColorInicial1.b);
                    }

                    if (child.isMesh && child.material && child.material.name == 'crema') {
                        Material2 = child.material;
                        Material2.color.setRGB(ColorInicial2.r, ColorInicial2.g, ColorInicial2.b);
                    }
                });
                if (animations && animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    animations.forEach(animation => {
                        const action = mixer.clipAction(animation);
                        action.play(); // Play each animation
                    });
                    console.log('All animations started');
                } else {
                    console.log('No animations found in the GLB/GLTF file');
                }
            });
        }

        function init() {
            let container = $(".general-container").append("<div>");
            camera = new THREE.PerspectiveCamera(40, anchoBanner / altoBanner, 20, 5000);
            camera.position.set(100, 50, 200);
            scene = new THREE.Scene();

            scene.add(camera);
            loadModel();

            new RGBELoader().load(urlHDRI, function (texture) {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.environment = texture;
            });

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

            if (isMobile) {
                renderer.setPixelRatio(0.2); // Reducir la resolución del renderizado en móviles
            } else {
                renderer.setPixelRatio(window.devicePixelRatio);
            }

            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = Exposicion;
            renderer.outputEncoding = THREE.sRGBEnconding;
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(anchoBanner, altoBanner);
            container.append(renderer.domElement);

            console.log("Inicializado");
            cargado = true;
           
        }

        function animate() {
            setTimeout(function() {
                requestAnimationFrame(animate);
                TWEEN.update();
                renderer.render(scene, camera);
                camera.lookAt(scene.position);
                if (mixer) mixer.update(0.01);
            }, isMobile ? 1000 / 30 : 1000 / 60); // 30 FPS en móviles, 60 FPS en desktop
        }




        $(document).ready(function(){

            $("#cargando").show();

            let scrolling = false;
            let scrollIndex = 0;
            let container = $("#scroll");
            let sections = container.find(".bloque");
            
            $("#start").click(function(e){
                scrollIndex = 1;
                onScroll(e);
            });

            let startY = 0;
            let endY = 0;
            let touchMoved = false;

            container.on("wheel", function (e) {
                e.preventDefault();
                onScroll(e, e.originalEvent.deltaY);
            });

            container.on("touchstart", function (e) {
                startY = e.originalEvent.touches[0].clientY;
                touchMoved = false;
            });

            container.on("touchmove", function (e) {
                endY = e.originalEvent.touches[0].clientY;
                touchMoved = true; // Indica que hubo un movimiento

                // Si el movimiento es significativo, previene el desplazamiento de la página
                if (Math.abs(startY - endY) > 5) {
                    e.preventDefault();
                }
            });

            container.on("touchend", function (e) {
                if (!touchMoved) {
                    // Si no hubo movimiento, considera esto como un click
                    $(e.target).trigger('click');
                } else {
                    let deltaY = startY - endY;
                    onScroll(e, deltaY);
                }
            });

           function onScroll(e, deltaY) {
                e.preventDefault();

                if (!scrolling && cargaCompleta) {
                    console.log("interactuando");

                    if (deltaY > 0 && scrollIndex < sections.length - 1) {
                        scrollIndex++;
                    } else if (deltaY < 0 && scrollIndex > 0) {
                        scrollIndex--;
                    }

                    const state = FasesAnimaciones[scrollIndex];
                    animateTransition(model, state, pasosAnimacion);

                    scrolling = true;
                    $.extend($.easing, {
                        easeOutCubic: function (x, t, b, c, d) {
                            return c * ((t = t / d - 1) * t * t + 1) + b;
                        }
                    });

                    container.animate({
                        scrollTop: sections.eq(scrollIndex).offset().top - container.offset().top + container.scrollTop()
                    }, {
                        duration: 2000, // Ajusta la duración según sea necesario
                        easing: 'easeOutCubic',

        function animateTransition(model, state, pasos){
            
            if (!model) {
                console.error("Model not loaded or undefined");
                return;
            }
            console.log("Animando a " + pasos + " pasos");
            const duration = 3000; // Duración de la animación en milisegundos (2 segundos)
            const steps = pasos; // Número de pasos en la animación (120 frames)
            let currentStep = 0;

            const initialRotation = { x: model.rotation.x, y: model.rotation.y, z: model.rotation.z };
            const initialPosition = { x: model.position.x, y: model.position.y, z: model.position.z };
            const initialScale = { x: model.scale.x, y: model.scale.y, z: model.scale.z };
            let initialColor1;
            let initialColor2;

            if(Material1){
                 initialColor1 = { r: Material1.color.r, g: Material1.color.g, b: Material1.color.b };
            }else{
                console.log("No tiene Material 1");
            }

            if(Material2){
                 initialColor2 = { r: Material2.color.r, g: Material2.color.g, b: Material2.color.b };

            }else{
                console.log("No tiene Material 2");
            }

            //
            const targetRotation = {
                x: degToRad(state.rotacionX),
                y: degToRad(state.rotacionY),
                z: degToRad(state.rotacionZ)
            };

            const animateStep = () => {
                const factor = easeOutCubic(currentStep / steps);

                // Interpolar rotación
                const newRotation = interpolacionRotacion(initialRotation, targetRotation, factor);
                model.rotation.set(newRotation.x, newRotation.y, newRotation.z);

                // Interpolar posición
                const newPosition = interpolacionPosicion(initialPosition, { x: state.posicionX, y: state.posicionY, z: state.posicionZ }, factor);
                model.position.set(newPosition.x, newPosition.y, newPosition.z);

                // Interpolar escala
                const newScale = interpolacionEscala(initialScale, { x: state.escala, y: state.escala, z: state.escala }, factor);
                model.scale.set(newScale.x, newScale.y, newScale.z);

                // Interpolar color
                if (Material1) {
                    const newColor1 = interpolacionColor(initialColor1, state.color1, factor);
                    Material1.color.setRGB(newColor1.r, newColor1.g, newColor1.b);
                }
                if (Material2) {
                    const newColor2 = interpolacionColor(initialColor2, state.color2, factor);
                    Material2.color.setRGB(newColor2.r, newColor2.g, newColor2.b);
                }

                renderer.render(scene, camera);

                currentStep++;
                if (currentStep <= steps) {
                    requestAnimationFrame(animateStep);
                }
            };

            animateStep();
        }

        // Función de interpolación de color
        function interpolacionColor(color1, color2, factor) {
            const result = {
                r: color1.r + (color2.r - color1.r) * factor,
                g: color1.g + (color2.g - color1.g) * factor,
                b: color1.b + (color2.b - color1.b) * factor
            };
            return result;
        }

        // Función de interpolación de escala
        function interpolacionEscala(escalaInicial, escalaObjetivo, factor){
            const result = {
                x: escalaInicial.x + (escalaObjetivo.x - escalaInicial.x) * factor,
                y: escalaInicial.y + (escalaObjetivo.y - escalaInicial.y) * factor,
                z: escalaInicial.z + (escalaObjetivo.z - escalaInicial.z) * factor
            }
            return result;
        }

        // Función de interpolación de posición
        function interpolacionPosicion(posicionInicial, posicionObjetivo, factor){
            const result = {
                x: posicionInicial.x + (posicionObjetivo.x - posicionInicial.x) * factor,
                y: posicionInicial.y + (posicionObjetivo.y - posicionInicial.y) * factor,
                z: posicionInicial.z + (posicionObjetivo.z - posicionInicial.z) * factor
            }
            return result;
        }

        // Función de interpolación de rotación
        function interpolacionRotacion(rotacionInicial, rotacionObjetivo, factor){
            const result = {
                x: rotacionInicial.x + (rotacionObjetivo.x - rotacionInicial.x) * factor,
                y: rotacionInicial.y + (rotacionObjetivo.y - rotacionInicial.y) * factor,
                z: rotacionInicial.z + (rotacionObjetivo.z - rotacionInicial.z) * factor
            }
            return result;
        }

        // Función de interpolación cúbica para suavizar la animación
        function cubicEaseInOut(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }


        function animateColorChange(material, targetColor, duration) {
            const currentColor = { r: material.color.r, g: material.color.g, b: material.color.b };
            new TWEEN.Tween(currentColor)
                .to(targetColor, duration)
                .onUpdate(() => {
                    material.color.setRGB(currentColor.r, currentColor.g, currentColor.b);
                })
                .start();
        }

        bloquesIMG.on("click", linkto);
    </script>
